<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>PhantomStream basic fixture</title>
  <style>
    p { color: green; }
    .highlight { background-color: yellow; }
    li { font-style: italic; }
  </style>
</head>
<body>
  <h1 id="main-heading">Basic fixture</h1>
  <p id="intro" class="highlight">An introductory paragraph with a styled class.</p>
  <p id="detail">A second paragraph that picks up the element selector.</p>
  <ul id="item-list">
    <li id="item-one">First item</li>
    <li id="item-two">Second item</li>
    <li id="item-three">Third item</li>
  </ul>
  <form id="contact-form" action="submit">
    <label for="name-input">Name</label>
    <input id="name-input" type="text" name="name" value="initial">
  </form>
  <img id="logo" src="assets/logo.png" alt="Logo">
  <div id="inline-styled" style="margin-top: 12px; color: rgb(200, 0, 0);">Inline styled block</div>
  <div id="card-area"></div>
</body>
</html>
